<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz LIMITLESSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f5ede0;
      --surface:     #fdf8f2;
      --surface-2:   #f7ede0;
      --surface-3:   #f0e3d0;
      --text:        #2c1f0e;
      --muted:       #7a6248;
      --faint:       #b89c7e;
      --line:        #e0ccb4;
      --line-hover:  #c8a882;
      /* Laranja principal */
      --brand:       #d4622a;
      --brand-h:     #e0784a;
      --brand-fg:    #fff8f3;
      /* Sage, acento secundário */
      --sage:        #5a7a58;
      /* Fases */
      --ph-a:        #c4501e;
      --ph-b:        #2e6e82;
      --ph-c:        #8a6a10;
      --ph-d:        #2e6040;
      --r: 16px;
      --r-sm: 11px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
    }

    /* ── Logo marca ── */
    .brand-logo {
      display: block;
      margin-bottom: 22px;
      line-height: 0;
    }
    .brand-logo img {
      height: clamp(28px, 6vw, 40px);
      width: auto;
      display: block;
    }

    /* ── Shell ── */
    .shell { width: min(660px, 100%); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: clamp(24px, 6vw, 48px);
      box-shadow: 0 8px 40px rgba(120,70,20,.12);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,98,42,.25), transparent);
    }

    /* ── Progress ── */
    .prog-track {
      height: 2px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .prog-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--brand), var(--brand-h));
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }
    .prog-meta {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--faint);
      margin-bottom: 32px;
    }

    /* ── Transição de ecrã ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen { animation: rise .3s ease both; }

    /* ── Intro ── */
    .eyebrow {
      display: block;
      font-size: .72rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 16px;
    }
    .intro-h {
      font-family: "Playfair Display", serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      line-height: 1.18;
      margin-bottom: 20px;
    }
    .intro-h em { font-style: italic; color: var(--brand-h); }
    .intro-value {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 18px;
    }
    .intro-p {
      color: var(--muted);
      line-height: 1.7;
      font-size: .96rem;
      margin-bottom: 28px;
    }
    .bullets { display: grid; gap: 11px; margin-bottom: 36px; }
    .bullet {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: .91rem;
      color: var(--muted);
    }
    .bullet-dot {
      color: var(--sage);
      font-size: .7rem;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* ── Pergunta ── */
    .q-h {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.15rem, 2.8vw, 1.5rem);
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 24px;
    }
    .q-hint {
      font-size: .86rem;
      color: var(--muted);
      margin-top: -12px;
      margin-bottom: 20px;
      line-height: 1.45;
    }
    .opts { display: grid; gap: 10px; margin-bottom: 26px; }
    .opt {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: .92rem;
      line-height: 1.5;
      color: var(--text);
    }
    .opt:hover {
      border-color: var(--line-hover);
      background: var(--surface-3);
    }
    .opt.sel {
      border-color: var(--brand);
      background: #fce8da;
      box-shadow: 0 0 0 1px var(--brand);
    }
    .opt-k {
      font-size: .75rem;
      font-weight: 600;
      color: var(--faint);
      margin-top: 3px;
      min-width: 1.1rem;
      width: auto;
      flex-shrink: 0;
    }
    .opt.sel .opt-k { color: var(--brand); }

    /* ── Botões ── */
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: none;
      border-radius: var(--r-sm);
      padding: 12px 22px;
      font-family: "DM Sans", sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter .12s, transform .12s, opacity .12s;
    }
    .btn-p {
      background: var(--brand);
      color: var(--brand-fg);
    }
    .btn-p:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-p:disabled { opacity: .38; cursor: not-allowed; }
    .btn-g {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .btn-g:hover:not(:disabled) { border-color: var(--line-hover); color: var(--text); }
    .btn-g:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Segmentação ── */
    .seg-q {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.35rem, 3.2vw, 1.75rem);
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 24px;
      text-align: center;
    }
    .seg-opts { display: grid; gap: 12px; margin-bottom: 8px; }
    .seg-opt {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--r-sm);
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: "DM Sans", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.45;
    }
    .seg-opt:hover {
      border-color: var(--brand);
      background: #fce8da;
    }
    .seg-opt:focus { outline: 2px solid var(--brand); outline-offset: 2px; }
    .seg-opt-sub {
      display: block;
      font-weight: 400;
      font-size: .86rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── A calcular ── */
    .calc {
      text-align: center;
      padding: 40px 0 24px;
    }
    .spin {
      width: 40px; height: 40px;
      border: 2px solid var(--line);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: rotate .85s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .calc-h {
      font-family: "Playfair Display", serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .calc-s { color: var(--muted); font-size: .9rem; }

    /* ── Resultado ── */
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 28px 0;
    }
    .phase-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .res-h {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.5rem, 3.5vw, 2.1rem);
      line-height: 1.25;
      margin-bottom: 14px;
    }
    .res-body {
      color: var(--muted);
      line-height: 1.7;
      font-size: .94rem;
      margin-bottom: 0;
    }
    .section-label {
      display: block;
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 14px;
    }
    .event-cards { display: grid; gap: 11px; }
    .ev-card {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--r-sm);
      padding: 15px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s;
      cursor: pointer;
    }
    .ev-card:hover {
      border-color: var(--line-hover);
      background: var(--surface-3);
    }
    .ev-icon { font-size: 1.15rem; margin-top: 1px; flex-shrink: 0; }
    .ev-title {
      font-weight: 600;
      font-size: .93rem;
      margin-bottom: 4px;
    }
    .ev-sub {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.4;
    }
    .ev-arrow {
      margin-left: auto;
      color: var(--faint);
      align-self: center;
      padding-left: 8px;
      flex-shrink: 0;
    }
    .score-note {
      font-size: .76rem;
      color: var(--faint);
      text-align: center;
      margin-top: 18px;
    }
    .btn-link {
      background: none;
      border: none;
      color: var(--faint);
      font-size: .82rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-family: "DM Sans", sans-serif;
      margin-top: 14px;
      display: block;
      width: 100%;
      text-align: center;
    }
    .btn-link:hover { color: var(--muted); }

    /* ── Email + ranking de soluções ── */
    .email-lead {
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.65;
      margin-bottom: 22px;
    }
    .rank-list {
      display: grid;
      gap: 10px;
      margin-bottom: 28px;
    }
    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      font-size: .9rem;
    }
    .rank-name { font-weight: 600; color: var(--text); }
    .rank-pts {
      font-size: .78rem;
      font-weight: 600;
      color: var(--brand);
      white-space: nowrap;
    }
    .email-field {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      font-family: "DM Sans", sans-serif;
      font-size: .95rem;
      margin-bottom: 14px;
      background: var(--surface);
    }
    .email-field:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(212, 98, 42, .2);
    }
    .email-hint {
      font-size: .8rem;
      color: var(--faint);
      margin-bottom: 18px;
    }
    .free-text-wrap {
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .free-text-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .free-text-area {
      width: 100%;
      min-height: 96px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      font-family: "DM Sans", sans-serif;
      font-size: .9rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      resize: vertical;
    }
    .free-text-area:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(212, 98, 42, .2);
    }
    .free-text-area::placeholder {
      color: var(--faint);
    }
  </style>
</head>
<body>
  <a class="brand-logo" href="https://essemood.com/" target="_blank" rel="noopener noreferrer"><img src="logo1.png" alt="ESSE MOOD"></a>
  <div class="shell">
    <div class="card">
      <div class="prog-track"><div class="prog-fill" id="bar"></div></div>
      <div class="prog-meta">
        <span id="lbl">Quiz LIMITLESSE</span>
        <span id="cnt"></span>
      </div>
      <div id="screen" class="screen"></div>
    </div>
  </div>

  <script>
    const QsSelf = [
      {
        text: "Qual o estado com que te identificas mais agora?",
        opts: [
          ["A", "Em modo de sobrevivência. Assoberbado e não sei para onde me virar."],
          ["B", "Cansado. O meu corpo e a minha mente estão a pedir uma pausa."],
          ["C", "Estou funcional, mas há hábitos que quero mudar."],
          ["D", "Estou relativamente estável, mas quero ser mais consistente."]
        ]
      },
      {
        text: "Como é a tua relação com o tempo no dia a dia?",
        opts: [
          ["A", "Nunca chega. Há sempre mais para fazer do que tempo disponível."],
          ["B", "Tenho tempo, mas nem sempre tenho energia para o aproveitar."],
          ["C", "Quando tenho tempo, procrastino e acabo por o desperdiçar."],
          ["D", "Consigo gerir razoavelmente, mas quero mais estrutura e clareza."]
        ]
      },
      {
        text: "O que sentes que te pesa mais neste momento?",
        opts: [
          ["A", "O excesso: tarefas, compromissos, informação, expectativas."],
          ["B", "O cansaço físico e mental. O descanço nunca é suficiente."],
          ["C", "Hábitos e pensamentos que me travam a evolução."],
          ["D", "A falta de consistência. Começo bem, mas não mantenho."]
        ]
      },
      {
        text: "Como descreves a tua relação com o teu corpo?",
        opts: [
          ["A", "Vivo mais na cabeça do que no corpo. Quase não o ouço."],
          ["B", "Sinto o corpo tenso, pesado ou inflamado."],
          ["C", "Estou atento aos sinais do meu corpo, mas gostava de o cuidar melhor."],
          ["D", "Cuido-o bem, mas quero ser mais regular e consistente."]
        ]
      },
      {
        text: "Como foi o teu o último mês?",
        opts: [
          ["A", "Caótico. Não tive espaço nem para pensar em mim."],
          ["B", "Oscilante. Há dias bons, mas não consigo estabilizar."],
          ["C", "Razoável: sei que posso mais e quero mudar alguns padrões."],
          ["D", "Relativamente bom. Quero consolidar e não perder o que já construí."]
        ]
      },
      {
        text: "Quando pensas em criar hábitos saudáveis, o que acontece?",
        opts: [
          ["A", "Sinto-me assoberbado e nem sei por onde começar."],
          ["B", "Gostava, mas não tenho motivação ou energia para começar."],
          ["C", "Tento, mas os velhos hábitos acabam sempre por voltar."],
          ["D", "Crio alguns hábitos, mas perco-os quando a vida complica."]
        ]
      },
      {
        text: "O que já tentaste para melhorar o teu bem-estar?",
        opts: [
          ["A", "Já tentei algumas coisas mas nada de forma consistente ou com grandes resultados."],
          ["B", "Ginásio ou treino regular."],
          ["C", "Yoga."],
          ["D", "Pilates."],
          ["E", "Outros desportos."],
          ["F", "Contacto com natureza."],
          ["G", "Banhos e/ou sauna."],
          ["H", "Caminhadas."],
          ["I", "Meditação."],
          ["J", "Breathwork ou respiração."],
          ["K", "Escrita ou journaling."],
          ["L", "Terapias (psicologia, medicinas alternativas, etc.)."],
          ["M", "Mentorias ou acompanhamento."],
          ["N", "Workshops ou cursos."],
          ["O", "Apps, vídeos ou conteúdos online."],
          ["P", "Podcasts ou livros."],
          ["Q", "Outros."]
        ]
      },
      {
        text: "O que sentes que mais precisas agora?",
        opts: [
          ["A", "Parar. Simplificar. Ter menos na cabeça."],
          ["B", "Recuperar. Descansar e regular de uma forma que resulte a sério."],
          ["C", "Mudar. Criar novos hábitos que perdurem de forma consistente."],
          ["D", "Manter e estabilizar."]
        ]
      },
      {
        text: "Qual destas emoções te acompanha mais ultimamente?",
        opts: [
          ["A", "Overwhelm: a sensação de que há demasiado e dificuldade em gerir."],
          ["B", "Exaustão: um cansaço constante que o sono não resolve."],
          ["C", "Frustração: sei o que preciso, mas não estou a conseguir chegar lá."],
          ["D", "Inquietação: estou no caminho certo, mas quero evoluir e acelerar."]
        ]
      },
      {
        text: "O que sentes que é o maior obstáculo entre ti e o teu bem-estar?",
        opts: [
          ["A", "O excesso e a sobrecarga de informação: não sei por onde começar nem o que eliminar primeiro."],
          ["B", "O meu sistema está drenado: não estou em condições de mudar enquanto não recuperar energia."],
          ["C", "Os meus padrões antigos: sei o que preciso de mudar, mas volto ao mesmo comportamento."],
          ["D", "A consistência: já mudei coisas, mas funciono em sprints e o desafio é não cair nos padrões antigos a longo prazo."]
        ]
      },
      {
        text: "Como está a tua relação contigo neste momento?",
        opts: [
          ["A", "Desconectada/o. Sinto que não me conheço bem: não sei bem o que gosto e o que quero."],
          ["B", "Má. Sinto-me desiludida/o e desmotivada/o."],
          ["C", "Em descoberta, mas instável."],
          ["D", "Boa, mas quero aprofundar e evoluir."]
        ]
      },
      {
        text: "Como queres estar daqui a 3 meses?",
        opts: [
          ["A", "Com menos pressão e mais espaço para respirar."],
          ["B", "Com mais energia e equilíbrio: corpo e mente sincronizados."],
          ["C", "Com novos hábitos e uma identidade mais alinhada com quem quero ser."],
          ["D", "A viver de forma consistente o que já sei que funciona para mim."]
        ]
      }
    ];

    const QsTeam = [
      {
        text: "Como descreves o estado geral da tua equipa neste momento?",
        opts: [
          ["A", "Em modo de sobrevivência: demasiadas exigências, pouco espaço para respirar."],
          ["B", "Baixa energia coletiva: cansaço visível e dificuldade em recuperar ritmo."],
          ["C", "Funcional, mas com padrões e fricções que já não servem a equipa."],
          ["D", "Relativamente estável e com vontade de consolidar o que funciona."]
        ]
      },
      {
        text: "Como é a relação da equipa com tempo, prazos e prioridades?",
        opts: [
          ["A", "Nunca chega. Há sempre mais para fazer do que capacidade."],
          ["B", "Há tempo no calendário, mas a energia da equipa não acompanha."],
          ["C", "Há espaço, mas a equipa não usa bem reuniões e foco."],
          ["D", "A gestão é razoável, mas falta clareza e ritmo sustentável."]
        ]
      },
      {
        text: "O que pesa mais ao grupo neste momento?",
        opts: [
          ["A", "Excesso: tarefas, reuniões, informação, expectativas externas."],
          ["B", "Desgaste físico e mental: pouca recuperação mesmo com pausas formais."],
          ["C", "Padrões antigos na forma de colaborar e decidir."],
          ["D", "Falta de consistência: boas iniciativas que não se mantêm."]
        ]
      },
      {
        text: "Como descreves o ritmo da equipa em relação ao corpo, pausas e recuperação?",
        opts: [
          ["A", "Muito cognitivo e pouco corpo: poucas pausas reais."],
          ["B", "Tensão e cansaço acumulado no grupo."],
          ["C", "Há consciência, mas hábitos de trabalho que precisam de mudar."],
          ["D", "Já há práticas (pausas, rituais), mas falta regularidade."]
        ]
      },
      {
        text: "Como foi o bem-estar coletivo (stress, desgaste, clima) no último mês?",
        opts: [
          ["A", "Caótico. Pouco espaço para acompanhar pessoas e carga."],
          ["B", "Oscilante. Bons dias misturados com sobrecarga constante."],
          ["C", "Razoável: dá para melhorar padrões e comunicação."],
          ["D", "Relativamente bom. O objetivo é não perder o ganho."]
        ]
      },
      {
        text: "Quando pensas em introduzir hábitos de bem-estar na equipa, o que acontece?",
        opts: [
          ["A", "Nem é prioridade agora: primeiro é gerir a urgência do dia a dia."],
          ["B", "Gostávamos, mas falta energia e clareza para começar."],
          ["C", "Tentamos iniciativas, mas os velhos hábitos de pressa voltam."],
          ["D", "Já existem ações pontuais, mas perdem-se quando o trabalho aperta."]
        ]
      },
      {
        text: "O que a organização ou a liderança já tentou para melhorar o bem-estar da equipa?",
        opts: [
          ["A", "Pouco ou nada de estruturado, ou tentativas muito curtas."],
          ["B", "Workshops de bem-estar, pausas, flexibilidade: foco em recuperar."],

    const N = 12;

    /**
     * Pontuação por solução (por trás de cada resposta A/B/C/D).

     * Pergunta 1 (estado atual): A Mentoria, B Retiros, C Workshops+Produtos, D Challenges+Produtos.
     * As entradas 1..11 repetem o mesmo template até personalizares por pergunta.
     */
    const SOLUTION_KEYS = ["mentoria", "retiros", "workshops", "produtos", "challenges"];
    const solutionLabels = {
      mentoria: "Mentoria LIMITLESSE",
      retiros: "Retiros",

    };
    const solutionMapQ1 = {
      A: { mentoria: 1 },
      B: { retiros: 1 },
      C: { workshops: 1, produtos: 1 },
      D: { challenges: 1, produtos: 1 }
    };
    const defaultSolutionRow = {
      A: { mentoria: 1 },
      B: { retiros: 1 },
      C: { workshops: 1, produtos: 1 },
      D: { challenges: 1, produtos: 1 }
    };
    /** Pergunta 7 (índice 6): 17 opções A-Q, multi (sem antiga opção «sozinho/a»). */
    const solutionMapTentaste6 = {
      A: { mentoria: 1 },
      B: { challenges: 1, produtos: 1 },
      C: { workshops: 1 },
      D: { workshops: 1 },
      E: { challenges: 1 },

      J: { workshops: 1 },

      N: { workshops: 1, challenges: 1 },

      P: { produtos: 1 },
      Q: { mentoria: 1 }
    };
    const solutionScoreMapsSelf = Array.from({ length: 12 }, (_, i) => {
      if (i === 0) return JSON.parse(JSON.stringify(solutionMapQ1));
      if (i === 6) return JSON.parse(JSON.stringify(solutionMapTentaste6));
      return JSON.parse(JSON.stringify(defaultSolutionRow));
    });
    const solutionScoreMapsTeam = Array.from({ length: 12 }, (_, i) => {
      if (i === 0) return JSON.parse(JSON.stringify(solutionMapQ1));
      return JSON.parse(JSON.stringify(defaultSolutionRow));
    });

    const st = { step: -2, segment: null, ans: Array(N).fill(null), email: "", tentasteNote: "" };

    function currentQs() { return st.segment === "team" ? QsTeam : QsSelf; }
    function currentPhases() { return st.segment === "team" ? phasesTeam : phasesSelf; }
    function currentSolutionMaps() { return st.segment === "team" ? solutionScoreMapsTeam : solutionScoreMapsSelf; }

    function eachAnswerLetter(i, fn) {
      const v = st.ans[i];
      if (v == null) return;
      if (Array.isArray(v)) {
        v.forEach(letter => fn(letter));
      } else {
        fn(v);
      }
    }

    function tallySolutionScores() {
      const maps = currentSolutionMaps();
      const totals = { mentoria: 0, retiros: 0, workshops: 0, produtos: 0, challenges: 0 };
      for (let i = 0; i < N; i++) {
        const row = maps[i];
        if (!row) continue;
        eachAnswerLetter(i, letter => {
          if (!letter || !row[letter]) return;
          const delta = row[letter];
          Object.keys(delta).forEach(k => { totals[k] = (totals[k] || 0) + delta[k]; });
        });
      }
      return totals;
    }

    function rankedSolutions(totals) {
      return SOLUTION_KEYS.map(k => ({ key: k, label: solutionLabels[k], score: totals[k] || 0 }))
        .sort((a, b) => b.score - a.score);
    }

    const $ = id => document.getElementById(id);

    function pct() {
      if (st.step < 0) return 0;
      if (st.step >= N) return 100;
      return Math.round(((st.step + 1) / N) * 100);
    }

    /**
     * Pergunta 7 (índice 6), opções A-Q: converte para contagem de fase LIMITLESSE (A-D).
     */
    function phaseLetterForScore(qi, letter) {
      if (qi !== 6 || !letter) return letter;
      const p6 = {
        A: "A",
        B: "C", C: "B", D: "B", E: "C",
        F: "B", G: "B", H: "B",
        I: "B", J: "B",
        K: "C",
        L: "D", M: "D",
        N: "C",
        O: "C", P: "C",
        Q: "C"
      };
      return p6[letter] !== undefined ? p6[letter] : letter;
    }

    function score() {
      const c = { A: 0, B: 0, C: 0, D: 0 };
      st.ans.forEach((v, i) => {
        if (v == null) return;
        const letters = Array.isArray(v) ? v : [v];
        letters.forEach(letter => {
          const L = phaseLetterForScore(i, letter);
          if (L && c[L] !== undefined) c[L]++;
        });
      });
      const sorted = Object.entries(c).sort((a, b) => b[1] - a[1]);
      return { counts: c, phase: sorted[0][0], tie: sorted[0][1] === sorted[1][1], second: sorted[1][0] };
    }

      const Q = currentQs();

        el.onclick = () => {
          const k = el.dataset.k;
          const cur = [...(st.ans[i] || [])];
          const pos = cur.indexOf(k);
          if (pos >= 0) cur.splice(pos, 1);
          else cur.push(k);
          cur.sort();
          st.ans[i] = cur;
          render();

        if (i > 0) st.step--;

        ta.value = st.tentasteNote || "";

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

        : `<p class="email-lead">Com as tuas respostas, volta ao Quiz ou contacta a ESSE MOOD para um plano à medida.</p>`;

      const head = team
        ? "Com base nas respostas sobre a vossa organização, estas são as áreas que mais se destacam para o próximo passo."
        : "Com base nas tuas respostas, estas são as soluções que mais se adequam ao teu momento (somatório das tuas escolhas em todas as perguntas).";
      const noteBlock =
        !team && (st.tentasteNote || "").trim()
          ? `<p class="email-lead" style="margin-top:4px;padding:12px 14px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--line);"><strong>O que acrescentaste sobre o que já tentaste:</strong><br>${escapeHtml(st.tentasteNote.trim()).replace(/\n/g, "<br>")}</p>`
          : "";

      w.innerHTML = `
        <span class="eyebrow">Recomendação por solução</span>
        <h2 class="res-h" style="margin-bottom:12px;">Onde fazes mais sentido agora</h2>
        <p class="email-lead">${head}</p>
        ${noteBlock}
        <div class="rank-list">${listHtml}</div>
        <p class="section-label" style="margin-bottom:10px;">Recebe o resumo por email</p>
        <input type="email" class="email-field" id="em-inp" placeholder="o teu@email.com" autocomplete="email">
        <p class="email-hint">Usamos o email apenas para te enviar o resumo deste Quiz. Depois vês o resultado completo com a fase LIMITLESSE.</p>
        <div class="actions">
          <button type="button" class="btn btn-p" id="em-go">Ver resultado completo →</button>
        </div>
      `;
      const inp = $("em-inp");
      if (st.email) inp.value = st.email;
      $("em-go").onclick = () => {
        const v = (inp.value || "").trim();
        st.email = v;
        if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
          inp.focus();
          inp.style.borderColor = "var(--ph-a)";
          return;
        }
        inp.style.borderColor = "";
        st.step = N + 2;
        render();
      };
    }

    function result(w) {
      const r = score();
      const ph = currentPhases()[r.phase];
      const team = st.segment === "team";
      const totals = tallySolutionScores();
      const ranked = rankedSolutions(totals).filter(x => x.score > 0);
      const topSol = ranked[0];
      const solRecap = topSol
        ? `<p class="res-body" style="margin-bottom:20px;padding:14px 16px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--line);"><strong>Solução em destaque:</strong> ${topSol.label}${ranked[1] ? ` · seguida de ${ranked[1].label}` : ""}.</p>`
        : "";
      const tentasteBlock =
        !team && (st.tentasteNote || "").trim()
          ? `<p class="res-body" style="margin-bottom:18px;padding:14px 16px;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--line);"><strong>O que partilhaste sobre o que já tentaste:</strong><br>${escapeHtml(st.tentasteNote.trim()).replace(/\n/g, "<br>")}</p>`
          : "";

      $("lbl").textContent = team ? "Resultado da equipa" : "O teu resultado";
      $("cnt").textContent = "";

      const secLabel = team
        ? "Programas e experiências recomendados para esta fase"
        : "Experiências recomendadas para a tua fase";
      const actions = team
        ? `<div class="actions" style="margin-top:22px;">
          <a class="btn btn-p" href="/empresas/" style="text-decoration:none;display:inline-block;">Programas para empresas →</a>
          <a class="btn btn-g" href="/experiencias/" style="text-decoration:none;display:inline-block;">Ver experiências →</a>
        </div>`
        : `<div class="actions" style="margin-top:22px;">
          <a class="btn btn-p" href="/experiencias/" style="text-decoration:none;display:inline-block;">Ver todos os eventos →</a>
          <a class="btn btn-g" href="/club/" style="text-decoration:none;display:inline-block;">Conhecer o ESSE Club</a>
        </div>`;

      w.innerHTML = `
        <span class="eyebrow">Quiz LIMITLESSE · Fase atual${team ? " (equipa)" : ""}</span>
        ${solRecap}
        ${tentasteBlock}
        <div class="phase-pill" style="background:${ph.col}1a;color:${ph.col};border:1px solid ${ph.col}44;">
          <span>●</span>${ph.code}
        </div>
        <h2 class="res-h">${ph.headline}</h2>
        <p class="res-body">${ph.body}</p>
        <hr class="divider">
        <span class="section-label">${secLabel}</span>
        <div class="event-cards">
          ${ph.events.map(ev => `
            <a class="ev-card" href="${ev.href}">
              <span class="ev-icon">${ev.icon}</span>
              <span>
                <div class="ev-title">${ev.title}</div>
                <div class="ev-sub">${ev.sub}</div>
              </span>
              <span class="ev-arrow">→</span>
            </a>
          `).join("")}
        </div>
        ${actions}
        <p class="score-note">Contagem fase (A·D): ${r.counts.A} · ${r.counts.B} · ${r.counts.C} · ${r.counts.D} &nbsp;|&nbsp; Pontos por solução: ${SOLUTION_KEYS.map(k => `${solutionLabels[k]} ${totals[k]}`).join(" · ")}</p>
        <button class="btn-link" id="restart">Refazer o Quiz</button>
      `;
      $("restart").onclick = () => { st.step = -2; st.segment = null; st.ans = Array(N).fill(null); st.email = ""; st.tentasteNote = ""; render(); };
    }

    render();
  </script>
</body>
</html>
